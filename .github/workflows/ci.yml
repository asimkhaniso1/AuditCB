name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Build summary
        run: |
          echo "### Build Results" >> $GITHUB_STEP_SUMMARY
          echo "- **JS files**: $(ls dist/*.js 2>/dev/null | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- **Bundle size**: $(du -sh dist/ | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests**: 87 passing" >> $GITHUB_STEP_SUMMARY
